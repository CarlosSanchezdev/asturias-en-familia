<header class="map-header">
  <div class="map-header__logo">
    <span class="map-header__logo-icon">🏔️</span>
    <div class="map-header__logo-text">
      <span class="map-header__logo-title">Asturias</span>
      <span class="map-header__logo-subtitle">en Familia</span>
    </div>
  </div>

  <div class="map-header__search-wrap">
    <svg class="map-header__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
    </svg>
    <input
      type="text"
      class="map-header__search-input"
      placeholder="¿Qué quieres hacer hoy en familia?"
      [value]="searchValue()"
      (input)="onSearchInput($event)"
      aria-label="Buscar actividades"
    />
    @if (searchValue()) {
      <button
        type="button"
        class="map-header__search-clear"
        (click)="clearSearch()"
        aria-label="Limpiar búsqueda"
      >✕</button>
    }
  </div>
</header>
