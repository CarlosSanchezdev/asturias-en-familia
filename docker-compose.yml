name: asturias-en-familia

services:
  # ─── Base de datos ────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aef-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── API REST ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: aef-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/asturias-familia
    volumes:
      - ./backend/src:/app/src        # hot-reload en dev
      - ./backend/tests:/app/tests
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── SPA Angular ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: aef-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src        # hot-reload Angular
      - /app/node_modules              # evitar sobreescribir node_modules

volumes:
  mongo_data:
    name: aef-mongo-data
