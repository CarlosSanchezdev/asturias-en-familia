<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo__icon">🗺️</span>
      <h1 class="login-logo__title">Asturias en Familia</h1>
      <p class="login-logo__subtitle">Panel de administración</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form" novalidate>
      <div class="field">
        <label for="email" class="field__label">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" class="field__input"
          [class.field__input--error]="emailCtrl.invalid && emailCtrl.touched" placeholder="admin@ejemplo.com"
          autocomplete="email" />
        @if (emailCtrl.invalid && emailCtrl.touched) {
        <span class="field__error">Introduce un correo válido</span>
        }
      </div>

      <div class="field">
        <label for="password" class="field__label">Contraseña</label>
        <input id="password" type="password" formControlName="password" class="field__input"
          [class.field__input--error]="passwordCtrl.invalid && passwordCtrl.touched" placeholder="••••••••"
          autocomplete="current-password" />
        @if (passwordCtrl.invalid && passwordCtrl.touched) {
        <span class="field__error">La contraseña es obligatoria</span>
        }
      </div>

      @if (error()) {
      <div class="login-error" role="alert">{{ error() }}</div>
      }

      <button type="submit" class="login-btn" [disabled]="loading()">
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
