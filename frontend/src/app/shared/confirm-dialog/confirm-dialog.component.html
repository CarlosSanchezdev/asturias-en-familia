<div class="dialog-backdrop" (click)="cancelled.emit()">
  <div class="dialog" role="alertdialog" aria-modal="true" (click)="$event.stopPropagation()">
    <h2 class="dialog__title">{{ title }}</h2>
    <p class="dialog__message">{{ message }}</p>
    <div class="dialog__actions">
      <button type="button" class="dialog__btn dialog__btn--cancel" (click)="cancelled.emit()">
        Cancelar
      </button>
      <button type="button" class="dialog__btn dialog__btn--confirm" (click)="confirmed.emit()">
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
