<aef-map-header
  (searchChange)="searchText.set($event)"
/>

<aef-filter-panel
  [categories]="activitiesService.categories()"
  (categoriesChange)="activeCategories.set($event)"
  (freeChange)="onlyFree.set($event)"
/>

<div id="map"></div>

@if (activitiesService.selectedActivity(); as activity) {
  <aef-activity-popup
    [activity]="activity"
    (close)="activitiesService.selectActivity(null)"
  />
}
